[General]
bypass-system = true

ipv6 = false
prefer-ipv6 = false

dns-server = https://cloudflare-dns.com/dns-query
fallback-dns-server = https://dns.google/dns-query, https://dns.cloudflare.com/dns-query

dns-direct-system = false
dns-direct-fallback-proxy = true
dns-fallback-proxy = true

private-ip-answer = false
icmp-auto-reply = true
udp-policy-not-supported-behaviour = REJECT


[Rule]

RULE-SET,https://raw.githubusercontent.com/david-lsl/shadowrocket-rules/refs/heads/main/rules/ai.rule,PROXY
RULE-SET,https://raw.githubusercontent.com/david-lsl/shadowrocket-rules/refs/heads/main/rules/cn.rule,DIRECT
RULE-SET,https://raw.githubusercontent.com/david-lsl/shadowrocket-rules/refs/heads/main/rules/apple.rule,DIRECT
RULE-SET,https://raw.githubusercontent.com/david-lsl/shadowrocket-rules/refs/heads/main/rules/stream.rule,PROXY
RULE-SET,https://raw.githubusercontent.com/david-lsl/shadowrocket-rules/refs/heads/main/rules/aws.rule,PROXY

GEOIP,CN,DIRECT
FINAL,PROXY